<div class="theme-wrapper">
  <mat-sidenav-container>
    <mat-sidenav mode="push" #sidenav>
      <app-sidenav (closeSidenav)="closeSidenav(sidenav)"></app-sidenav>
    </mat-sidenav>

    <mat-sidenav mode="over" position="end" class="theme-settings-sidenav" #settingsSidenav>
      <app-theme-settings-drawer
        (closeSettings)="closeSettingsSidenav(settingsSidenav)"
      ></app-theme-settings-drawer>
    </mat-sidenav>

    <mat-sidenav-content>
      <div class="header-wrapper mat-elevation-z4" [ngStyle]="getHeaderWrapperStyle()">
        <app-header
          (openSidenav)="openSidenav(sidenav)"
          (openSettings)="openSettingsSidenav(settingsSidenav)"
        ></app-header>
      </div>

      <app-site-banner></app-site-banner>

      <div class="background-graphic-wrapper">
        <app-background></app-background>
      </div>

      <div class="content-wrapper" [ngStyle]="getContentWrapperStyle()">
        <router-outlet></router-outlet>
      </div>

      @if (isStreamingMessage) {
        <div class="stream-message-wrapper">
          <app-streaming-messages></app-streaming-messages>
        </div>
      }

      <div class="footer-wrapper" [ngStyle]="getFooterStyle()">
        <div class="footer-animator" [ngStyle]="getFooterAnimatorStyle()">
          <app-footer></app-footer>
        </div>
      </div>
    </mat-sidenav-content>
  </mat-sidenav-container>
</div>
