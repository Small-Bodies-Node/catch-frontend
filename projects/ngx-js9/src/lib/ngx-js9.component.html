<div class="ngx-js9-host">
  <div
    [id]="menubarId"
    class="JS9Menubar"
    [attr.data-width]="widthPxls + 'px'"
    data-buttonClass="JS9Button-flat js9-my-menu-button-class"
  ></div>
  <div
    [id]="uid"
    class="JS9"
    [attr.data-width]="widthPxls + 'px'"
    [attr.data-height]="getHeight()"
  ></div>
  <div
    class="JS9Colorbar"
    [id]="colorbarId"
    [attr.data-width]="widthPxls + 'px'"
    style="background-color: rgba(0, 0, 0, 0); line-height: 0px"
  ></div>
</div>
